<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的网页</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.7);
        --primary: #7c3aed;
        --primary2: #06b6d4;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --card: rgba(17, 24, 39, 0.06);
          --text: rgba(17, 24, 39, 0.92);
          --muted: rgba(17, 24, 39, 0.7);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          "PingFang SC", "Microsoft YaHei", Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
        color: var(--text);
        background: radial-gradient(1200px 600px at 20% 10%, rgba(124, 58, 237, 0.35), transparent 60%),
          radial-gradient(1000px 600px at 85% 20%, rgba(6, 182, 212, 0.28), transparent 55%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 28px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 4vw, 36px);
        letter-spacing: 0.2px;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 12px 16px;
        color: white;
        font-weight: 650;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), var(--primary2));
        box-shadow: 0 10px 22px rgba(124, 58, 237, 0.28);
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
        box-shadow: 0 14px 26px rgba(124, 58, 237, 0.34);
      }

      button:active {
        transform: translateY(0px);
      }

      .pill {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="title">欢迎来到我的网页</h1>
      <p>这是一个包含<strong>标题</strong>和<strong>按钮</strong>的简单页面。</p>
      <div class="row">
        <button id="btn" type="button">点我一下</button>
        <span class="pill" id="status">状态：未点击</span>
      </div>
    </main>

    <script>
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");

      btn.addEventListener("click", () => {
        const now = new Date();
        const time = now.toLocaleTimeString("zh-CN", { hour12: false });
        status.textContent = `状态：已点击（${time}）`;
        alert("你点击了按钮！");
      });
    </script>
  </body>
</html>
